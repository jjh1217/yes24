<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YES24 크레마클럽</title>

    <!-- open graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://b2b.yes24.com/admin">
    <meta property="og:title" content="YES24 CREMA CLUB B2B Admin System">
    <meta property="og:description" content="YES24 CREMA CLUB B2B 관리자 시스템으로 기업 고객의 주문, 정산, 회원 관리 등을 손쉽게 할 수 있습니다.">
    <meta property="og:image" content="https://b2b.yes24.com/assets/img/sns_logo.png">

    <!-- favicon -->
    <link rel="icon" href="../assets/img/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/img/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/img/favicon/apple-touch-icon.png">
    <link rel="manifest" href="../assets/img/favicon/site.webmanifest">

    <!-- stylesheets -->
    <link rel="stylesheet" href="../assets/css/jquery-ui.min.css">
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/account.css">

    <!-- script -->
    <script type="text/javascript" src="./assets/js/jquery-3.7.1.min.js"></script>
    <script type="text/javascript" src="./assets/js/jquery-migrate-1.4.1.min.js"></script>
    <script type="text/javascript" src="./assets/js/jquery-ui.min.js"></script>
    <script type="text/javascript" src="./assets/js/common.js"></script>
</head>
<body>
    <div class="wrap">
        <header></header>

        <aside></aside>

        <main>
            <form action="#" class="box_content">
                <div class="tit_box">
                    <h2>관리자 정보</h2>
                </div>
                <div class="box_item">
                    <fieldset class="form_field">
                        <legend>관리자 정보 입력란</legend>
                        <div class="form_row">
                            <label class="req">관리자 ID</label>
                            <div class="form_item">
                                <input type="text" value="uiwang01" readonly>
                            </div>
                        </div>
                        <div class="form_row">
                            <label>비밀번호</label>
                            <div class="form_item">
                                <input type="password" placeholder="비밀번호를 입력하세요.">
                            </div>
                            <p class="msg">* 영문, 숫자, 특수문자 3가지를 혼합하여 최소 11자 이상으로 입력하세요.</p>
                            <p class="msg c_red">* 잘못된 비밀번호 입니다. 영문, 숫자, 특수문자를 혼합하여 최소 11자 이상으로 입력하세요.</p>
                        </div>
                        <div class="form_row">
                            <label>비밀번호 확인</label>
                            <div class="form_item">
                                <input type="password" placeholder="비밀번호를 한번 더 입력하세요.">
                            </div>
                            <p class="msg c_primary">* 비밀번호가 일치합니다.</p>
                            <p class="msg c_red">* 비밀번호가 일치하지 않습니다.</p>
                        </div>
                        <div class="form_row">
                            <label class="req">관리자명</label>
                            <div class="form_item">
                                <input type="text" value="홍길동" placeholder="관리자명을 입력하세요.">
                            </div>
                        </div>
                        <div class="form_row">
                            <label class="req">관리자 E-mail</label>
                            <div class="form_item">
                                <input type="text" value="testgood007@gamil.com" placeholder="이메일을 입력하세요.">
                            </div>
                        </div>
                        <div class="form_row">
                            <label class="req">관리자 권한</label>
                            <div class="form_item">
                                <div class="select_box">
                                    <button type="button" class="val" aria-haspopup="listbox" aria-expanded="false" aria-label="관리자 권한 선택"></button>
                                    <ul class="options" role="listbox">
                                        <li role="option" aria-selected="true" tabindex="0">슈퍼 관리자</li>
                                        <li role="option" aria-selected="false" tabindex="-1">YES24 관리자</li>
                                        <li role="option" aria-selected="false" tabindex="-1">고객사 관리자</li>
                                        <li role="option" aria-selected="false" tabindex="-1">영업처 관리자</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        <div class="form_row">
                            <label class="req">접속 IP</label>
                            <div class="form_item">
                                <input type="text" value="192.168.07.83" placeholder="IP를 입력하세요.">
                            </div>
                            <button type="button" class="btn fill_dark">추가</button>
                        </div>
                        <div class="form_row">
                            <label>이용 상태</label>
                            <div class="chk_box">
                                <label class="item">
                                    <input type="radio" name="chk_1" checked>
                                    <span>이용중</span>
                                </label>
                                <label class="item">
                                    <input type="radio" name="chk_1">
                                    <span>이용 중지중</span>
                                </label>
                            </div>
                        </div>
                        <div class="form_row">
                            <label class="req">변경 사유</label>
                            <div class="form_item">
                                <textarea placeholder="관리자 변경 사유를 입력하세요."></textarea>
                            </div>
                        </div>
                    </fieldset>
                    <div class="btn_box jc_end g_20">
                        <button type="button" class="btn fill_gray lg round confirm_open" data-type="cancel">취소</button>
                        <button type="button" class="btn fill_blue lg round confirm_open" data-type="update">수정</button>
                    </div>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
