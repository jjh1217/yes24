<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YES24</title>

    <!-- favicon -->
    <link rel="icon" href="./assets/img/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/img/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/img/favicon/apple-touch-icon.png">
    <link rel="manifest" href="./assets/img/favicon/site.webmanifest">

    <!-- stylesheets -->
    <link rel="stylesheet" href="./assets/css/common.css">
    <link rel="stylesheet" href="./assets/css/layout.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/jquery-ui.min.css">

    <!-- script -->
    <script type="text/javascript" src="./assets/js/jquery-3.7.1.min.js"></script>
    <script type="text/javascript" src="./assets/js/jquery-migrate-1.4.1.min.js"></script>
    <script type="text/javascript" src="./assets/js/jquery-ui.min.js"></script>
    <script type="text/javascript" src="./assets/js/common.js"></script>
</head>
<body>
    <div class="wrap">
        <header></header>

        <aside></aside>

        <main>
            <form action="#" class="box_content">
                <div class="tit_box">
                    <h2>고객사 정보</h2>
                </div>
                <div class="box_item">
                    <fieldset class="form_field">
                        <legend>고객사 정보 입력란</legend>
                        <div class="form_row">
                            <label>고객사명</label>
                            <div class="form_item">
                                <input type="text" value="홍익대학교" readonly>
                            </div>
                        </div>
                        <div class="form_row">
                            <label>쿠폰번호</label>
                            <div class="form_item">
                                <input type="text" value="23534234" readonly>
                            </div>
                        </div>
                        <div class="form_row">
                            <label>쿠폰명</label>
                            <div class="form_item">
                                <input type="text" value="[크레마클럽] 크레마클럽 이용권 (홍익대학교)" readonly>
                            </div>
                        </div>
                        <div class="form_row">
                            <label>제휴사(PID)</label>
                            <div class="form_item">
                                <input type="text" value="69798089" readonly>
                            </div>
                        </div>
                        <div class="form_row">
                            <label>고객사 e-mail</label>
                            <div class="form_item">
                                <input type="text" placeholder="이메일을 입력해주세요." value="testgood12@gmail.com">
                            </div>
                        </div>
                        <div class="form_row">
                            <label>고객사 연락처</label>
                            <div class="form_item">
                                <input type="text" placeholder="연락처를 입력해주세요." value="010-9856-1234">
                            </div>
                        </div>
                        <div class="form_row">
                            <label>서비스 모델</label>
                            <div class="chk_box">
                                <label class="item">
                                    <input type="radio" name="chk_1" checked disabled>
                                    <span>정액제</span>
                                </label>
                                <label class="item">
                                    <input type="radio" name="chk_1" disabled>
                                    <span>종량제</span>
                                </label>
                            </div>
                        </div>
                        <div class="form_row">
                            <label>서비스 기준</label>
                            <div class="chk_box">
                                <label class="item">
                                    <input type="radio" name="chk_2" checked disabled>
                                    <span>최종 열람 일시 기준</span>
                                </label>
                                <label class="item">
                                    <input type="radio" name="chk_2" disabled>
                                    <span>도서 선택 일시 기준</span>
                                </label>
                            </div>
                        </div>
                        <div class="form_row">
                            <label>계약 기간</label>
                            <div class="form_item">
                                <input type="text" value="2026.02.03" class="t_ct" readonly>
                                <span class="txt">~</span>
                                <input type="text" value="2026.03.03" class="t_ct" readonly>
                            </div>
                        </div>
                        <div class="form_row">
                            <label class="wn_200">예산 소진 시 자동 대여 차단 여부</label>
                            <div class="chk_box">
                                <label class="item">
                                    <input type="radio" name="chk_3" checked disabled>
                                    <span>사용</span>
                                </label>
                                <label class="item">
                                    <input type="radio" name="chk_3" disabled>
                                    <span>미사용</span>
                                </label>
                            </div>
                        </div>
                        <div class="form_row">
                            <label class="wn_200">계약 기간 내 변경 제한 여부</label>
                            <div class="chk_box">
                                <label class="item">
                                    <input type="radio" name="chk_4" checked disabled>
                                    <span>사용</span>
                                </label>
                                <label class="item">
                                    <input type="radio" name="chk_4" disabled>
                                    <span>미사용</span>
                                </label>
                            </div>
                        </div>
                        <div class="form_row">
                            <label class="wn_200">서비스 상태</label>
                            <div class="chk_box">
                                <label class="item">
                                    <input type="radio" name="chk_5" checked disabled>
                                    <span>사용중</span>
                                </label>
                                <label class="item">
                                    <input type="radio" name="chk_5" disabled>
                                    <span>사용 중지중</span>
                                </label>
                            </div>
                        </div>
                        <div class="form_row">
                            <h3 class="tit">통계 설정</h3>
                            <p class="msg c_primary pl_0">※ 통계 내 독서율과 읽은 시간의 노출 여부를 관리할 수 있습니다.</p>
                        </div>
                        <div class="form_row">
                            <label>독서율 사용 여부</label>
                            <div class="chk_box">
                                <label class="item">
                                    <input type="radio" name="chk_6" checked>
                                    <span>사용</span>
                                </label>
                                <label class="item">
                                    <input type="radio" name="chk_6">
                                    <span>미사용</span>
                                </label>
                            </div>
                        </div>
                        <div class="form_row">
                            <label>읽은 시간 사용 여부</label>
                            <div class="chk_box">
                                <label class="item">
                                    <input type="radio" name="chk_7" checked>
                                    <span>사용</span>
                                </label>
                                <label class="item">
                                    <input type="radio" name="chk_7">
                                    <span>미사용</span>
                                </label>
                            </div>
                        </div>
                        <div class="form_row">
                            <h3 class="tit">정산 가공 정보</h3>
                        </div>
                        <div class="form_row">
                            <label class="wn_160">전자책 가공 비율 설정</label>
                            <div class="chk_box">
                                <label class="item">
                                    <input type="radio" name="chk_8">
                                    <span>고정 비율</span>
                                </label>
                                <label class="item">
                                    <input type="radio" name="chk_8" checked>
                                    <span>가공 비율</span>
                                </label>
                            </div>
                        </div>
                        <div class="form_row">
                            <label class="wn_160 req">전자책 가공 비율</label>
                            <div class="form_item numOnly">
                                <input type="text">
                            </div>
                            <div class="form_item w_90">
                                <div class="select_box">
                                    <button type="button" class="val" aria-haspopup="listbox" aria-expanded="false" aria-label="전자책 가공 비율 단위 선택"></button>
                                    <ul class="options" role="listbox">
                                        <li role="option" aria-selected="true" tabindex="0">%</li>
                                        <li role="option" aria-selected="false" tabindex="-1">원</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        <div class="form_row">
                            <label class="wn_160">오디오북 가공 비율 설정</label>
                            <div class="chk_box">
                                <label class="item">
                                    <input type="radio" name="chk_9">
                                    <span>고정 비율</span>
                                </label>
                                <label class="item">
                                    <input type="radio" name="chk_9" checked>
                                    <span>가공 비율</span>
                                </label>
                            </div>
                        </div>
                        <div class="form_row">
                            <label class="wn_160 req">오디오북 가공 비율</label>
                            <div class="form_item numOnly">
                                <input type="text">
                            </div>
                            <div class="form_item w_90">
                                <div class="select_box">
                                    <button type="button" class="val" aria-haspopup="listbox" aria-expanded="false" aria-label="오디오북 가공 비율 단위 선택"></button>
                                    <ul class="options" role="listbox">
                                        <li role="option" aria-selected="true" tabindex="0">%</li>
                                        <li role="option" aria-selected="false" tabindex="-1">원</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        <div class="form_row">
                            <h3 class="tit">정산 가공 정보</h3>
                        </div>
                        <div class="form_row">
                            <label>영업처명</label>
                            <div class="form_item">
                                <input type="text" placeholder="영업처명을 입력하세요.">
                            </div>
                            <div class="btn_box">
                                <button type="button" class="btn fill_dark">검색</button>
                                <button type="button" class="btn fill_gray p_0 w_80">초기화</button>
                            </div>
                        </div>
                        <div class="form_row">
                            <label>영업처 구분</label>
                            <div class="form_item">
                                <input type="text">
                            </div>
                        </div>
                        <div class="form_row">
                            <label>대표자명</label>
                            <div class="form_item">
                                <input type="text" placeholder="대표자명을 입력하세요.">
                            </div>
                        </div>
                        <div class="form_row">
                            <label>지역</label>
                            <div class="form_item">
                                <input type="text" placeholder="지역을 입력하세요.">
                            </div>
                        </div>
                    </fieldset>
                    <div class="btn_box jc_end g_20">
                        <button type="button" class="btn fill_gray lg round">취소</button>
                        <button type="button" class="btn fill_blue lg round">수정</button>
                    </div>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
